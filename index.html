<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SimpleBlock</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f0f0f'/><text x='50' y='65' font-size='50' fill='%233ea6ff' text-anchor='middle' font-family='system-ui'>SB</text></svg>">
  <style>
    :root { --bg: #0f0f0f; --fg: #f1f1f1; --accent: #3ea6ff; --input: #1f1f1f; --card: #1a1a1a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { background: var(--bg); color: var(--fg); display: flex; flex-direction: column; height: 100dvh; }
    header { padding: 12px; background: var(--input); display: flex; gap: 8px; align-items: center; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(8px); }
    input { flex: 1; padding: 10px 12px; border: none; background: var(--bg); color: var(--fg); border-radius: 8px; font-size: 16px; outline: none; }
    button { background: var(--accent); color: #000; border: none; padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; text-align: center; }
    .card { background: var(--card); padding: 16px; border-radius: 12px; width: 100%; max-width: 420px; line-height: 1.6; }
    .card a { color: var(--accent); text-decoration: none; }
    .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .install-btn { display: none; margin-top: 12px; background: #22c55e; color: #000; }
    .install-btn.visible { display: inline-block; }
    footer { padding: 12px; text-align: center; color: #666; font-size: 12px; }
    .badge { background: #22c55e; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <header>
    <input type="text" id="url" placeholder="youtube.com ou pesquise" autocomplete="off" inputmode="url">
    <button onclick="navigate()">Abrir</button>
  </header>
  <main>
    <div class="card">
      <span class="badge">✅ ATIVO</span><br>
      <span class="status-dot"></span> <b>Bloqueio de anúncios habilitado</b><br><br>
      🎯 Navegação limpa e rápida<br>
      📦 Cache inteligente<br>
      🚫 Sem anúncios no YouTube<br><br>
      <small style="color: #666">Proxy Cloudflare ativo • Atualizado</small>
    </div>
    <button class="install-btn" id="installBtn">📲 Adicionar à Tela Inicial</button>
  </main>
  <footer>SimpleBlock PWA • Leve • Rápido • Cross-Platform</footer>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.error);
    
    function navigate() {
      let val = document.getElementById('url').value.trim();
      if (!val) return;
      
      const isUrl = val.includes('.') && !val.includes(' ');
      const target = isUrl ? (val.startsWith('http') ? val : `https://${val}`) 
                           : `https://www.youtube.com/results?search_query=${encodeURIComponent(val)}`;
      
      // Redireciona pelo proxy do Cloudflare
      const proxyUrl = `https://simpleblock-proxy.adrian-cantero1.workers.dev/proxy/${encodeURIComponent(target)}`;
    }
    
    document.getElementById('url').addEventListener('keydown', e => { if(e.key==='Enter') navigate(); });
    
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); deferredPrompt = e;
      document.getElementById('installBtn').classList.add('visible');
    });
    document.getElementById('installBtn').addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; document.getElementById('installBtn').classList.remove('visible'); });
      }
    });
  </script>
</body>
</html>
